services:
  - type: web
    name: smart-attendance-system
    env: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///attendance.db
      - key: CLASSROOM_RADIUS_METERS
        value: 200
      - key: DISABLE_LOCATION_CHECK
        value: true
      - key: QR_SCAN_ENTRY_WINDOW_MINUTES
        value: 10
      - key: PRESENCE_TIMEOUT_MINUTES
        value: 5
